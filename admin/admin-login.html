<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>管理员登录 - 福建名优特产管理系统</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
<script src="../config.js"></script>
<script src="admin-auth.js"></script>
<style>
body{background-color:#f8fafc;font-family:'PingFang SC','Microsoft YaHei',sans-serif;}
.login-gradient{background:linear-gradient(135deg,#b91c1c 0%,#7f1d1d 100%);}
</style>
</head>
<body class="flex items-center justify-center min-h-screen">
<div class="flex w-full max-w-4xl bg-white rounded-3xl overflow-hidden shadow-2xl border border-slate-100">
  <!-- Left brand panel -->
  <div class="hidden md:flex md:w-1/2 login-gradient p-12 flex-col justify-between text-white relative overflow-hidden">
    <div class="relative z-10">
      <div class="flex items-center gap-2 mb-8">
        <iconify-icon class="text-4xl" icon="fluent-emoji:tea"></iconify-icon>
        <span class="text-2xl font-bold tracking-wider">闽韵优选</span>
      </div>
      <h1 class="text-4xl font-extrabold leading-tight mb-4">福建特产<br/>智慧订单管理</h1>
      <p class="text-red-100/80 leading-relaxed">让闽地之味，跨越山海，连接每一位食客。</p>
    </div>
    <div class="relative z-10 space-y-4">
      <div class="flex items-center gap-3 text-sm">
        <iconify-icon icon="heroicons:shield-check-solid"></iconify-icon>
        <span>企业级安全加密</span>
      </div>
      <p class="text-xs text-red-200/60">© 2026 福建名优特产电商平台</p>
    </div>
    <div class="absolute -bottom-10 -right-10 opacity-20 transform rotate-12">
      <iconify-icon class="text-[200px] text-white" icon="mingcute:department-line"></iconify-icon>
    </div>
  </div>

  <!-- Right login form -->
  <div class="w-full md:w-1/2 p-12 flex flex-col justify-center">
    <div class="mb-10 text-center md:text-left">
      <h2 class="text-3xl font-bold text-slate-800 mb-2">欢迎回来</h2>
      <p class="text-slate-500">请输入管理员凭据以进入系统</p>
    </div>
    <div id="errorMsg" class="mb-4 p-3 bg-red-50 border border-red-200 rounded-xl text-sm text-red-700 hidden"></div>
    <form id="loginForm" class="space-y-6">
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-2">管理员账号</label>
        <div class="relative">
          <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400"><iconify-icon icon="heroicons:user-16-solid"></iconify-icon></span>
          <input id="username" class="w-full pl-11 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-red-600 focus:border-red-600 outline-none transition-all text-slate-700" placeholder="管理员账号" type="text" value="admin_fj01"/>
        </div>
      </div>
      <div>
        <div class="flex justify-between mb-2">
          <label class="text-sm font-semibold text-slate-700">密码</label>
          <a class="text-xs text-red-700 hover:text-red-800" href="#">忘记密码？</a>
        </div>
        <div class="relative">
          <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400"><iconify-icon icon="heroicons:lock-closed-16-solid"></iconify-icon></span>
          <input id="password" class="w-full pl-11 pr-12 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-red-600 focus:border-red-600 outline-none transition-all text-slate-700" placeholder="请输入密码" type="password"/>
          <button type="button" onclick="togglePwd()" class="absolute inset-y-0 right-0 pr-4 flex items-center text-slate-400 hover:text-slate-600">
            <iconify-icon id="eyeIcon" icon="lucide:eye-off"></iconify-icon>
          </button>
        </div>
      </div>
      <div class="flex items-center gap-2">
        <input checked class="w-4 h-4 text-red-700 border-slate-300 rounded focus:ring-red-600 accent-red-700" id="remember" type="checkbox"/>
        <label class="text-sm text-slate-600" for="remember">保持登录 12 小时</label>
      </div>
      <button id="loginBtn" class="w-full bg-red-700 hover:bg-red-800 text-white font-bold py-3.5 rounded-xl shadow-lg shadow-red-700/20 transform transition-all active:scale-[0.98] flex items-center justify-center gap-2" type="submit">
        <iconify-icon icon="lucide:log-in"></iconify-icon>
        <span id="loginBtnText">立即登录</span>
      </button>
    </form>
  </div>
</div>

<script>
// Redirect if already logged in
if (AdminAuth.getToken()) window.location.href = 'dashboard.html';

document.getElementById('loginForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  var btn  = document.getElementById('loginBtn');
  var text = document.getElementById('loginBtnText');
  var err  = document.getElementById('errorMsg');
  var user = document.getElementById('username').value.trim();
  var pass = document.getElementById('password').value;

  btn.disabled = true; text.textContent = '登录中...'; err.classList.add('hidden');

  try {
    var res = await fetch(AdminAuth.BASE + '/api/admin/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: user, password: pass })
    });
    var data = await res.json();
    if (data.token) {
      AdminAuth.login(data.token, data.admin);
      window.location.href = 'dashboard.html';
    } else {
      err.textContent = data.error || '登录失败，请重试';
      err.classList.remove('hidden');
      btn.disabled = false; text.textContent = '立即登录';
    }
  } catch(e) {
    err.textContent = '网络错误，请检查后端是否运行';
    err.classList.remove('hidden');
    btn.disabled = false; text.textContent = '立即登录';
  }
});

function togglePwd() {
  var inp = document.getElementById('password');
  var ico = document.getElementById('eyeIcon');
  if (inp.type === 'password') { inp.type = 'text'; ico.setAttribute('icon','lucide:eye'); }
  else { inp.type = 'password'; ico.setAttribute('icon','lucide:eye-off'); }
}
</script>
</body>
</html>
