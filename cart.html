<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>购物车 - 闽味到家</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
<script src="config.js"></script>
<script src="cart-utils.js"></script>
<script src="api.js"></script>
</head>
<body class="bg-[#FFFBF0] text-slate-800 font-sans min-h-screen">
<div id="toast" style="position:fixed;bottom:5rem;left:50%;transform:translateX(-50%) translateY(20px);background:#15803d;color:#fff;padding:.6rem 1.4rem;border-radius:9999px;font-size:.85rem;font-weight:600;opacity:0;transition:all .3s;pointer-events:none;z-index:9999;white-space:nowrap;"></div>

<nav class="bg-white border-b border-orange-100 h-16 flex items-center px-4 sticky top-0 z-50">
  <a class="flex items-center gap-2 font-bold text-sm" href="products.html"><iconify-icon icon="lucide:chevron-left"></iconify-icon>继续购物</a>
  <span class="mx-auto font-bold text-lg">购物车</span>
  <span id="cartCount" class="text-sm text-gray-400"></span>
</nav>

<main class="max-w-2xl mx-auto px-4 py-6 pb-32">
  <div id="emptyState" class="hidden text-center py-24">
    <iconify-icon class="text-6xl text-gray-200" icon="lucide:shopping-cart"></iconify-icon>
    <p class="text-gray-400 mt-4 mb-6">购物车是空的</p>
    <a href="products.html" class="bg-[#B72126] text-white px-6 py-3 rounded-xl font-bold inline-block">去选购</a>
  </div>
  <div id="cartList" class="bg-white rounded-3xl shadow-sm overflow-hidden mb-5"></div>
  <div id="shippingSection" class="bg-white rounded-3xl p-5 shadow-sm mb-5">
    <h3 class="font-bold mb-4 flex items-center gap-2 text-sm"><iconify-icon class="text-orange-600" icon="lucide:truck"></iconify-icon>配送方式</h3>
    <div class="space-y-3">
      <label id="labelCold" class="flex items-center justify-between p-4 border-2 border-[#B72126] bg-red-50 rounded-2xl cursor-pointer">
        <div class="flex items-center gap-3">
          <input checked class="accent-[#B72126]" name="ship" type="radio" value="delivery" onchange="updateShipping()"/>
          <div><p class="text-sm font-bold">湾区冷链送货上门</p><p class="text-xs text-gray-500">满 $49 免运费 · 周二/周五配送</p></div>
        </div>
        <span class="text-sm font-bold" id="deliveryFeeLabel">$5.00</span>
      </label>
      <label id="labelPickup" class="flex items-center justify-between p-4 border border-orange-100 rounded-2xl cursor-pointer">
        <div class="flex items-center gap-3">
          <input class="accent-[#B72126]" name="ship" type="radio" value="pickup" onchange="updateShipping()"/>
          <div><p class="text-sm font-bold">自提 (San Jose 门店)</p><p class="text-xs text-gray-500">预约后到店取货</p></div>
        </div>
        <span class="text-sm font-bold text-green-600">免费</span>
      </label>
    </div>
  </div>
  <div id="couponSection" class="bg-white rounded-3xl p-5 shadow-sm mb-5">
    <div class="flex gap-2 mb-2">
      <input id="couponInput" class="flex-1 border border-orange-200 rounded-xl px-4 py-2 text-sm outline-none focus:ring-1 focus:ring-[#B72126]" placeholder="输入优惠码 (试试 NEWUSER)" type="text"/>
      <button onclick="applyCoupon()" id="couponBtn" class="px-4 py-2 bg-slate-800 text-white rounded-xl text-xs font-bold hover:bg-slate-700">应用</button>
    </div>
    <p id="couponMsg" class="text-xs hidden"></p>
  </div>
  <div id="summarySection" class="bg-white rounded-3xl p-5 shadow-sm mb-5">
    <div class="space-y-3 mb-5">
      <div class="flex justify-between text-gray-500 text-sm"><span>商品小计</span><span id="subtotalDisplay">$0.00</span></div>
      <div class="flex justify-between text-gray-500 text-sm"><span>运费</span><span id="shippingDisplay">$5.00</span></div>
      <div id="discountRow" class="flex justify-between text-red-500 text-sm hidden"><span>优惠券</span><span id="discountDisplay">-$0.00</span></div>
      <div class="h-px bg-orange-50"></div>
      <div class="flex justify-between text-lg font-bold"><span>总计</span><span class="text-[#B72126]" id="totalDisplay">$0.00</span></div>
    </div>
    <a id="checkoutBtn" href="checkout.html" class="block w-full bg-[#B72126] text-white text-center py-4 rounded-2xl font-bold shadow-lg shadow-red-200 hover:scale-[1.02] transition-transform">去结账</a>
  </div>
</main>

<script>
var couponDiscount = 0, couponCode = '';

function renderCart() {
  var items = Cart.getItems();
  var hasItems = items.length > 0;
  document.getElementById('emptyState').style.display = hasItems ? 'none' : 'block';
  ['cartList','shippingSection','couponSection','summarySection'].forEach(function(id){
    document.getElementById(id).style.display = hasItems ? '' : 'none';
  });
  document.getElementById('cartCount').textContent = hasItems
    ? items.reduce(function(s,i){return s+i.qty;},0) + ' 件商品' : '';
  if (!hasItems) return;

  document.getElementById('cartList').innerHTML = items.map(function(item, idx) {
    return '<div class="p-5'+(idx<items.length-1?' border-b border-orange-50':'')+' flex gap-4 items-center">' +
      '<img class="w-20 h-20 object-cover rounded-xl flex-shrink-0" src="'+(item.image_path||'images/products/'+item.slug+'.jpg')+'" alt="'+item.name_zh+'"/>' +
      '<div class="flex-1 min-w-0">' +
        '<h3 class="font-bold mb-0.5 text-sm truncate">'+item.name_zh+'</h3>' +
        '<p class="text-xs text-gray-400 mb-2">'+(item.unit||'冷链配送')+'</p>' +
        '<div class="flex items-center justify-between">' +
          '<span class="text-[#B72126] font-bold" id="price-'+item.slug+'">${'+(item.price*item.qty).toFixed(2)+'}</span>' +
          '<div class="flex items-center border border-orange-100 rounded-lg h-8">' +
            '<button onclick="changeQty(\''+item.slug+'\',-1)" class="px-3 text-gray-400 hover:text-[#B72126] font-bold text-lg">−</button>' +
            '<span class="px-2 font-bold text-sm w-6 text-center">'+item.qty+'</span>' +
            '<button onclick="changeQty(\''+item.slug+'\',1)" class="px-3 text-[#B72126] font-bold text-lg">+</button>' +
          '</div>' +
        '</div>' +
      '</div>' +
      '<button onclick="removeItem(\''+item.slug+'\')" class="text-gray-200 hover:text-red-400 ml-2 flex-shrink-0 text-xl">×</button>' +
    '</div>';
  }).join('');

  recalc();
}

function changeQty(slug, d) { Cart.update(slug, (Cart.getItems().find(function(i){return i.slug===slug;})||{qty:0}).qty+d); renderCart(); }
function removeItem(slug) { Cart.remove(slug); renderCart(); showToast('已移除'); }

function updateShipping() {
  var isPickup = document.querySelector('[name="ship"]:checked').value === 'pickup';
  ['labelCold','labelPickup'].forEach(function(id,i){
    var active = isPickup ? i===1 : i===0;
    document.getElementById(id).className = 'flex items-center justify-between p-4 rounded-2xl cursor-pointer ' +
      (active ? 'border-2 border-[#B72126] bg-red-50' : 'border border-orange-100');
  });
  recalc();
}

function recalc() {
  var sub = Cart.subtotal();
  var isPickup = document.querySelector('[name="ship"]:checked').value === 'pickup';
  var ship = isPickup ? 0 : (sub >= 49 ? 0 : 5);
  var total = Math.max(0, sub + ship - couponDiscount);

  document.getElementById('subtotalDisplay').textContent = '$'+sub.toFixed(2);
  document.getElementById('shippingDisplay').textContent = ship===0 ? (sub>=49&&!isPickup?'免费(满$49)':'免费') : '$'+ship.toFixed(2);
  document.getElementById('totalDisplay').textContent = '$'+total.toFixed(2);
  document.getElementById('deliveryFeeLabel').textContent = sub>=49&&!isPickup ? '免费' : '$5.00';
  document.getElementById('discountRow').style.display = couponDiscount>0 ? '' : 'none';
  if (couponDiscount>0) document.getElementById('discountDisplay').textContent = '-$'+couponDiscount.toFixed(2);

  localStorage.setItem('mw_delivery_type', isPickup?'pickup':'delivery');
  localStorage.setItem('mw_coupon_code', couponCode);
  localStorage.setItem('mw_coupon_discount', couponDiscount);
}

async function applyCoupon() {
  var code = document.getElementById('couponInput').value.trim();
  var msg = document.getElementById('couponMsg');
  var btn = document.getElementById('couponBtn');
  if (!code) return;
  btn.textContent = '验证中...'; btn.disabled = true;
  try {
    var result = await MinweiAPI.validateCoupon(code, Cart.subtotal());
    msg.classList.remove('hidden');
    if (result.valid) {
      couponDiscount = result.discount; couponCode = code.toUpperCase();
      msg.textContent = '✓ '+result.message; msg.className = 'text-xs text-green-600';
      document.getElementById('couponInput').disabled = true; btn.textContent = '已应用';
    } else {
      msg.textContent = '✗ '+(result.error||'优惠码无效'); msg.className = 'text-xs text-red-500';
      btn.textContent = '应用'; btn.disabled = false;
    }
  } catch(e) {
    msg.textContent = '✗ 网络错误，请重试'; msg.className = 'text-xs text-red-500';
    btn.classList.remove('hidden'); btn.textContent = '应用'; btn.disabled = false;
  }
  recalc();
}

function showToast(msg) {
  var t=document.getElementById('toast');
  t.textContent=msg; t.style.opacity='1'; t.style.transform='translateX(-50%) translateY(0)';
  setTimeout(function(){t.style.opacity='0'; t.style.transform='translateX(-50%) translateY(20px)';},2000);
}

renderCart();
</script>
</body>
</html>
