<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>安全结账 - 闽味到家</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
<script src="https://js.stripe.com/v3/"></script>
<script src="cart-utils.js"></script>
<script src="api.js"></script>
<style>
#card-element{padding:.75rem 1rem;border:1px solid #fed7aa;border-radius:.75rem;background:#fff;}
#card-element.StripeElement--focus{border-color:#B72126;box-shadow:0 0 0 1px #B72126;}
#card-element.StripeElement--invalid{border-color:#ef4444;}
.step-ring{transition:all .3s;}
</style>
</head>
<body class="bg-[#FFFBF0] text-slate-800 font-sans min-h-screen">

<!-- Progress -->
<div class="sticky top-0 z-50 bg-white border-b border-orange-100">
  <div class="max-w-xl mx-auto px-4 h-14 flex items-center gap-4">
    <a href="cart.html" class="text-gray-400 hover:text-slate-800"><iconify-icon icon="lucide:chevron-left" class="text-xl"></iconify-icon></a>
    <div class="flex items-center gap-2 flex-1 justify-center">
      <div class="step-ring w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold" id="s1ring">1</div>
      <div class="h-px flex-1 bg-orange-100" id="line12"></div>
      <div class="step-ring w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold" id="s2ring">2</div>
      <div class="h-px flex-1 bg-orange-100" id="line23"></div>
      <div class="step-ring w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold" id="s3ring">3</div>
    </div>
    <a href="index.html"><div class="w-8 h-8 bg-[#B72126] rounded-full flex items-center justify-center"><span class="text-white font-bold text-sm">闽</span></div></a>
  </div>
</div>

<main class="max-w-xl mx-auto px-4 py-8 pb-24">

  <!-- ── STEP 1: OTP Auth ─────────────────────────── -->
  <section id="step1" class="bg-white rounded-3xl p-6 shadow-sm border border-orange-100 mb-5">
    <h3 class="font-bold mb-4 flex items-center gap-2">
      <span class="w-6 h-6 bg-slate-900 text-white rounded-full flex items-center justify-center text-[10px]">1</span>
      快捷登录/注册
    </h3>
    <div id="authForm" class="space-y-4">
      <div>
        <label class="block text-xs font-bold text-gray-500 mb-2 uppercase">手机号</label>
        <div class="flex gap-2">
          <select id="areaCode" class="w-20 border border-orange-200 rounded-xl px-3 py-3 text-sm font-bold bg-white outline-none">
            <option>+1</option><option>+86</option>
          </select>
          <input id="phoneInput" class="flex-1 border border-orange-200 rounded-xl px-4 py-3 outline-none focus:ring-1 focus:ring-[#B72126]" placeholder="650-000-0000" type="tel" maxlength="15"/>
        </div>
      </div>
      <div class="flex gap-2">
        <input id="otpInput" class="flex-1 border border-orange-200 rounded-xl px-4 py-3 outline-none focus:ring-1 focus:ring-[#B72126]" placeholder="6位验证码" type="text" maxlength="6"/>
        <button id="otpBtn" onclick="sendOtp()" type="button" class="px-4 py-3 bg-orange-50 text-orange-700 rounded-xl text-sm font-bold whitespace-nowrap hover:bg-orange-100 transition-colors">获取验证码</button>
      </div>
      <p id="otpMsg" class="text-xs hidden"></p>
      <button onclick="verifyOtp()" id="verifyBtn" class="w-full bg-slate-900 text-white py-3 rounded-2xl font-bold hover:bg-black transition-colors">验证并继续</button>
    </div>
    <div id="authDone" class="hidden flex items-center gap-3 bg-green-50 border border-green-200 rounded-2xl p-4">
      <iconify-icon class="text-green-600 text-xl flex-shrink-0" icon="lucide:check-circle-2"></iconify-icon>
      <div><p class="font-bold text-sm text-green-800" id="authName">已登录</p><p class="text-xs text-green-600" id="authPhone"></p></div>
      <button onclick="resetAuth()" class="ml-auto text-xs text-gray-400 hover:text-gray-600">换账号</button>
    </div>
  </section>

  <!-- ── STEP 2: Shipping ─────────────────────────── -->
  <section id="step2" class="bg-white rounded-3xl p-6 shadow-sm border border-orange-100 mb-5 opacity-50 pointer-events-none">
    <h3 class="font-bold mb-4 flex items-center gap-2">
      <span class="w-6 h-6 bg-slate-200 text-slate-600 rounded-full flex items-center justify-center text-[10px]" id="s2num">2</span>
      收货信息
    </h3>
    <div class="grid grid-cols-2 gap-4 mb-4">
      <div>
        <label class="block text-xs font-bold text-gray-500 mb-2 uppercase">姓名</label>
        <input id="recipName" class="w-full border border-orange-200 rounded-xl px-4 py-3 outline-none focus:ring-1 focus:ring-[#B72126]" placeholder="收货人姓名" type="text"/>
      </div>
      <div>
        <label class="block text-xs font-bold text-gray-500 mb-2 uppercase">联系电话</label>
        <input id="recipPhone" class="w-full border border-orange-200 rounded-xl px-4 py-3 outline-none focus:ring-1 focus:ring-[#B72126]" placeholder="手机号码" type="tel"/>
      </div>
    </div>
    <div class="mb-4">
      <label class="block text-xs font-bold text-gray-500 mb-2 uppercase">详细地址 (湾区全境配送)</label>
      <textarea id="address" class="w-full border border-orange-200 rounded-xl px-4 py-3 outline-none focus:ring-1 focus:ring-[#B72126] resize-none" placeholder="Street, City, CA  Zip Code" rows="2"></textarea>
    </div>
    <div class="p-4 bg-orange-50 rounded-xl border border-dashed border-orange-200 mb-4">
      <p class="text-[10px] text-orange-800 leading-relaxed font-medium">
        <iconify-icon class="inline-block mr-1" icon="lucide:info"></iconify-icon>
        冷链配送：周二/周五统一配送。请确保收货时有人在家或门口有阴凉处存放。
      </p>
    </div>
    <button onclick="confirmShipping()" class="w-full bg-slate-900 text-white py-3 rounded-2xl font-bold hover:bg-black transition-colors">确认地址，继续支付</button>
  </section>

  <!-- ── STEP 3: Payment ─────────────────────────── -->
  <section id="step3" class="bg-white rounded-3xl p-6 shadow-sm border border-orange-100 mb-5 opacity-50 pointer-events-none">
    <h3 class="font-bold mb-4 flex items-center gap-2">
      <span class="w-6 h-6 bg-slate-200 text-slate-600 rounded-full flex items-center justify-center text-[10px]" id="s3num">3</span>
      支付方式
    </h3>

    <!-- Method selector -->
    <div class="flex gap-3 mb-5">
      <button id="btnCard" onclick="selectPayMethod('card')" class="flex-1 py-3 border-2 border-[#B72126] bg-red-50 rounded-xl flex items-center justify-center gap-2 text-sm font-bold">
        💳 银行卡
      </button>
      <button id="btnWechat" onclick="selectPayMethod('wechat_pay')" class="flex-1 py-3 border border-orange-100 rounded-xl flex items-center justify-center gap-2 text-sm font-medium text-gray-500 hover:border-green-400 hover:text-green-700 transition-all">
        <span class="text-lg">💚</span> 微信支付
      </button>
    </div>

    <!-- Stripe card element -->
    <div id="cardSection">
      <div id="card-element" class="mb-3"></div>
      <p id="cardError" class="text-xs text-red-500 mb-3 hidden"></p>
    </div>

    <!-- WeChat Pay QR section -->
    <div id="wechatSection" class="hidden text-center py-4">
      <div id="wechatQr" class="hidden">
        <p class="text-sm text-gray-600 mb-3">请用微信扫码支付</p>
        <img id="wechatQrImg" class="w-48 h-48 mx-auto rounded-xl border border-gray-200" src="" alt="WeChat QR"/>
        <p class="text-xs text-gray-400 mt-3">扫码后请等待页面自动跳转</p>
      </div>
      <div id="wechatWaiting" class="text-sm text-gray-500">准备微信支付中...</div>
    </div>

    <!-- Order summary mini -->
    <div class="bg-slate-50 rounded-xl p-4 mb-4 text-sm space-y-2">
      <div class="flex justify-between text-gray-500"><span>商品合计</span><span id="pSubtotal">-</span></div>
      <div class="flex justify-between text-gray-500"><span>运费</span><span id="pShipping">-</span></div>
      <div id="pDiscountRow" class="flex justify-between text-red-500 hidden"><span>优惠券</span><span id="pDiscount">-</span></div>
      <div class="flex justify-between font-bold pt-2 border-t border-slate-200"><span>应付</span><span class="text-[#B72126]" id="pTotal">-</span></div>
    </div>

    <button id="payBtn" onclick="submitPayment()" class="w-full bg-[#B72126] text-white py-5 rounded-3xl font-bold text-lg shadow-xl shadow-red-200 flex items-center justify-center gap-2">
      <iconify-icon icon="lucide:lock"></iconify-icon>
      <span id="payBtnText">确认支付</span>
    </button>
    <p class="text-center text-[10px] text-gray-400 mt-3">点击支付即代表同意《服务条款》与《隐私声明》</p>
  </section>

</main>

<script>
var currentStep = 1;
var authToken = null;
var orderId = null;
var stripeInstance = null;
var cardElement = null;
var paymentMethod = 'card';
var clientSecret = null;

// ── Restore cart summary in step 3 ───────────────────────────
function updatePaySummary() {
  var sub = Cart.subtotal();
  var delivType = localStorage.getItem('mw_delivery_type') || 'delivery';
  var ship = delivType === 'pickup' ? 0 : (sub >= 49 ? 0 : 5);
  var disc = parseFloat(localStorage.getItem('mw_coupon_discount') || '0');
  var total = Math.max(0, sub + ship - disc);

  document.getElementById('pSubtotal').textContent = '$'+sub.toFixed(2);
  document.getElementById('pShipping').textContent = ship === 0 ? '免费' : '$'+ship.toFixed(2);
  document.getElementById('pTotal').textContent = '$'+total.toFixed(2);
  document.getElementById('payBtnText').textContent = '确认支付 $'+total.toFixed(2);
  if (disc > 0) {
    document.getElementById('pDiscountRow').classList.remove('hidden');
    document.getElementById('pDiscount').textContent = '-$'+disc.toFixed(2);
  }
}

// ── Step progress UI ──────────────────────────────────────────
function setStep(n) {
  currentStep = n;
  [1,2,3].forEach(function(i) {
    var ring = document.getElementById('s'+i+'ring');
    var sect = document.getElementById('step'+i);
    if (i < n) {
      ring.className = 'step-ring w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold bg-green-500 text-white';
      ring.innerHTML = '✓';
    } else if (i === n) {
      ring.className = 'step-ring w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold bg-[#B72126] text-white';
      ring.innerHTML = i;
      sect.classList.remove('opacity-50','pointer-events-none');
    } else {
      ring.className = 'step-ring w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold bg-slate-200 text-slate-500';
      ring.innerHTML = i;
      sect.classList.add('opacity-50','pointer-events-none');
    }
  });
}

// ── OTP ───────────────────────────────────────────────────────
var otpTimer = null;

async function sendOtp() {
  var phone = document.getElementById('phoneInput').value.trim();
  var area = document.getElementById('areaCode').value;
  if (!phone) { showOtpMsg('请输入手机号', 'red'); return; }

  var btn = document.getElementById('otpBtn');
  btn.disabled = true; btn.textContent = '发送中...';

  try {
    var res = await MinweiAPI.sendCode(phone, area);
    if (res.success) {
      showOtpMsg('✓ 验证码已发送', 'green');
      var secs = 60;
      otpTimer = setInterval(function() {
        secs--;
        btn.textContent = '重新发送('+secs+'s)';
        if (secs <= 0) { clearInterval(otpTimer); btn.disabled = false; btn.textContent = '获取验证码'; }
      }, 1000);
    } else {
      showOtpMsg(res.error || '发送失败', 'red');
      btn.disabled = false; btn.textContent = '获取验证码';
    }
  } catch(e) {
    showOtpMsg('网络错误，请重试', 'red');
    btn.disabled = false; btn.textContent = '获取验证码';
  }
}

async function verifyOtp() {
  var phone = document.getElementById('phoneInput').value.trim();
  var area = document.getElementById('areaCode').value;
  var code = document.getElementById('otpInput').value.trim();
  if (!code) { showOtpMsg('请输入验证码', 'red'); return; }

  var btn = document.getElementById('verifyBtn');
  btn.disabled = true; btn.textContent = '验证中...';

  try {
    var res = await MinweiAPI.verifyCode(phone, area, code);
    if (res.token) {
      authToken = res.token;
      MinweiAPI.setToken(authToken);
      document.getElementById('authForm').classList.add('hidden');
      document.getElementById('authDone').classList.remove('hidden');
      document.getElementById('authName').textContent = res.user.nickname + ' 已登录';
      document.getElementById('authPhone').textContent = area + ' ' + phone;
      setStep(2);
    } else {
      showOtpMsg(res.error || '验证失败', 'red');
      btn.disabled = false; btn.textContent = '验证并继续';
    }
  } catch(e) {
    showOtpMsg('网络错误，请重试', 'red');
    btn.disabled = false; btn.textContent = '验证并继续';
  }
}

function resetAuth() {
  authToken = null; MinweiAPI.logout();
  document.getElementById('authForm').classList.remove('hidden');
  document.getElementById('authDone').classList.add('hidden');
  setStep(1);
}

function showOtpMsg(msg, color) {
  var el = document.getElementById('otpMsg');
  el.textContent = msg;
  el.className = 'text-xs text-'+(color==='red'?'red-500':'green-600');
  el.classList.remove('hidden');
}

// ── Shipping step ─────────────────────────────────────────────
function confirmShipping() {
  var name = document.getElementById('recipName').value.trim();
  var phone = document.getElementById('recipPhone').value.trim();
  var addr = document.getElementById('address').value.trim();
  if (!name || !phone || !addr) {
    alert('请填写完整的收货信息');
    return;
  }
  localStorage.setItem('mw_recip_name', name);
  localStorage.setItem('mw_recip_phone', phone);
  localStorage.setItem('mw_address', addr);
  setStep(3);
  updatePaySummary();
  initStripe();
}

// ── Stripe init ───────────────────────────────────────────────
async function initStripe() {
  if (stripeInstance) return;
  try {
    // Get publishable key from API
    var sub = Cart.subtotal();
    var tmpTotal = Math.max(0, sub + 5 - parseFloat(localStorage.getItem('mw_coupon_discount')||'0'));
    // Create a temporary order to get the publishable key
    // (we'll use the key from .env on first load)
    var pkMeta = document.querySelector('meta[name="stripe-pk"]');
    var pk = pkMeta ? pkMeta.content : window.STRIPE_PK;
    if (!pk) {
      // Fetch pk from health endpoint
      var hRes = await fetch(MinweiAPI.BASE + '/health').catch(function(){return null;});
      if (hRes) {
        var hData = await hRes.json();
        pk = hData.stripe_pk;
      }
    }
    if (!pk) { console.warn('Stripe PK not available — using mock mode'); return; }
    stripeInstance = Stripe(pk);
    var elements = stripeInstance.elements();
    cardElement = elements.create('card', {
      style: {
        base: { fontSize: '16px', color: '#1E293B', '::placeholder': { color: '#94A3B8' } },
        invalid: { color: '#ef4444' }
      }
    });
    cardElement.mount('#card-element');
    cardElement.on('change', function(e) {
      var err = document.getElementById('cardError');
      if (e.error) { err.textContent = e.error.message; err.classList.remove('hidden'); }
      else { err.classList.add('hidden'); }
    });
  } catch(err) {
    console.error('Stripe init error:', err);
  }
}

// ── Payment method toggle ─────────────────────────────────────
function selectPayMethod(method) {
  paymentMethod = method;
  document.getElementById('btnCard').className = 'flex-1 py-3 rounded-xl flex items-center justify-center gap-2 text-sm font-bold transition-all ' +
    (method==='card' ? 'border-2 border-[#B72126] bg-red-50' : 'border border-orange-100 text-gray-500');
  document.getElementById('btnWechat').className = 'flex-1 py-3 rounded-xl flex items-center justify-center gap-2 text-sm font-bold transition-all ' +
    (method==='wechat_pay' ? 'border-2 border-green-500 bg-green-50 text-green-700' : 'border border-orange-100 text-gray-500');
  document.getElementById('cardSection').style.display = method==='card' ? '' : 'none';
  document.getElementById('wechatSection').style.display = method==='wechat_pay' ? '' : 'none';
  document.getElementById('btnCard').innerHTML = '💳 银行卡';
  document.getElementById('btnWechat').innerHTML = '<span class="text-lg">💚</span> 微信支付';
}

// ── Submit order + payment ────────────────────────────────────
async function submitPayment() {
  var btn = document.getElementById('payBtn');
  btn.disabled = true;
  document.getElementById('payBtnText').textContent = '处理中...';

  var items = Cart.getItems();
  if (!items.length) { alert('购物车为空'); btn.disabled=false; return; }

  try {
    // 1. Create order
    var orderData = {
      items: items,
      delivery_type: localStorage.getItem('mw_delivery_type') || 'delivery',
      coupon_code: localStorage.getItem('mw_coupon_code') || '',
      recipient_name:  localStorage.getItem('mw_recip_name'),
      recipient_phone: localStorage.getItem('mw_recip_phone'),
      address: localStorage.getItem('mw_address'),
      user_id: MinweiAPI.getUser()?.user_id
    };

    var orderRes = await MinweiAPI.createOrder(orderData);
    if (!orderRes.order_id) throw new Error(orderRes.error || '下单失败');
    orderId = orderRes.order_id;

    // 2. Create payment intent
    var intentRes = await MinweiAPI.createPaymentIntent(orderId, paymentMethod);
    if (!intentRes.client_secret && !intentRes.payment_intent_id) throw new Error('支付初始化失败');
    clientSecret = intentRes.client_secret;

    // 3. Confirm payment
    if (paymentMethod === 'card' && stripeInstance && cardElement && clientSecret) {
      var result = await stripeInstance.confirmCardPayment(clientSecret, {
        payment_method: { card: cardElement }
      });
      if (result.error) throw new Error(result.error.message);
      if (result.paymentIntent.status === 'succeeded') {
        onPaymentSuccess(orderRes);
      }
    } else if (paymentMethod === 'wechat_pay' && stripeInstance && clientSecret) {
      document.getElementById('wechatWaiting').textContent = '正在生成微信支付二维码...';
      var wcResult = await stripeInstance.confirmWechatPayPayment(clientSecret, {
        payment_method_options: { wechat_pay: { client: 'web' } }
      });
      if (wcResult.error) throw new Error(wcResult.error.message);
      if (wcResult.paymentIntent?.next_action?.wechat_pay_display_qr_code) {
        var qrData = wcResult.paymentIntent.next_action.wechat_pay_display_qr_code;
        document.getElementById('wechatWaiting').style.display = 'none';
        document.getElementById('wechatQrImg').src = qrData.image_url_png;
        document.getElementById('wechatQr').classList.remove('hidden');
        // Poll for payment completion
        pollPaymentStatus(orderId, orderRes);
        return;
      }
    } else {
      // Mock / no Stripe key — simulate success for dev
      console.warn('Mock payment — no Stripe key configured');
      await new Promise(function(r){setTimeout(r,1500);});
      onPaymentSuccess(orderRes);
    }
  } catch(err) {
    console.error('Payment error:', err);
    alert('支付失败：' + err.message);
    btn.disabled = false;
    document.getElementById('payBtnText').textContent = '重试支付';
  }
}

async function pollPaymentStatus(oid, orderRes) {
  var maxTries = 60; var tries = 0;
  var timer = setInterval(async function() {
    tries++;
    if (tries > maxTries) { clearInterval(timer); alert('支付超时，请联系客服'); return; }
    try {
      var res = await fetch(MinweiAPI.BASE + '/api/orders/' + oid);
      var data = await res.json();
      if (data.order && data.order.status !== 'pending_payment') {
        clearInterval(timer);
        onPaymentSuccess(orderRes);
      }
    } catch(e) {}
  }, 3000);
}

function onPaymentSuccess(orderRes) {
  Cart.clear();
  localStorage.removeItem('mw_coupon_code');
  localStorage.removeItem('mw_coupon_discount');
  localStorage.removeItem('mw_delivery_type');
  localStorage.setItem('mw_last_order_id', orderRes.order_id);
  localStorage.setItem('mw_last_order_number', orderRes.order_number);
  localStorage.setItem('mw_last_order_delivery', orderRes.estimated_delivery);
  window.location.href = 'success.html';
}

// Expose API base for Stripe PK fetch
MinweiAPI.BASE = MinweiAPI.BASE || 'https://damoyas-mac-mini.tailb141dd.ts.net';

// Pre-fill if logged in
window.addEventListener('DOMContentLoaded', function() {
  var user = MinweiAPI.getUser();
  if (user) {
    document.getElementById('authForm').classList.add('hidden');
    document.getElementById('authDone').classList.remove('hidden');
    document.getElementById('authName').textContent = user.nickname + ' 已登录';
    authToken = localStorage.getItem('mw_token');
    setStep(2);
  } else {
    setStep(1);
  }
  selectPayMethod('card');
});
</script>
</body>
</html>
