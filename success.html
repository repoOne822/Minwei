<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>下单成功 - 闽味到家</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
<style>
@keyframes popIn{0%{transform:scale(.4);opacity:0}70%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
.pop-in{animation:popIn .6s ease both;}
@keyframes fadeUp{0%{transform:translateY(20px);opacity:0}100%{transform:translateY(0);opacity:1}}
.fade-up{animation:fadeUp .5s ease both;}
.d1{animation-delay:.2s;}.d2{animation-delay:.4s;}.d3{animation-delay:.6s;}
</style>
</head>
<body class="bg-[#FFFBF0] font-sans min-h-screen flex items-center justify-center px-4">
<div class="max-w-md w-full py-12 bg-white rounded-[3rem] shadow-2xl shadow-orange-200 text-center relative overflow-hidden">
  <div class="absolute -top-12 -left-12 w-40 h-40 bg-orange-50 rounded-full blur-3xl"></div>
  <div class="absolute -bottom-12 -right-12 w-40 h-40 bg-red-50 rounded-full blur-3xl"></div>
  <div class="relative z-10 px-8">
    <div class="w-24 h-24 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-8 pop-in">
      <iconify-icon class="text-5xl text-green-600" icon="lucide:check-circle-2"></iconify-icon>
    </div>
    <h1 class="text-3xl font-extrabold mb-3 fade-up text-slate-800">下单成功！</h1>
    <p class="text-slate-500 mb-8 px-2 fade-up d1 text-sm">
      订单 <span class="text-slate-900 font-bold" id="orderNum">#MW20260428-0001</span> 已收到。鲜味即将启程！
    </p>
    <div class="bg-orange-50 rounded-3xl p-6 text-left mb-8 border border-orange-100 fade-up d2">
      <div class="flex items-start gap-3 mb-4">
        <iconify-icon class="text-orange-600 mt-1 text-lg flex-shrink-0" icon="lucide:truck"></iconify-icon>
        <div>
          <p class="font-bold text-sm">冷链配送预估时间</p>
          <p class="text-xs text-gray-500 mt-1" id="deliveryTime">计算中...</p>
        </div>
      </div>
      <div class="flex items-start gap-3">
        <iconify-icon class="text-[#B72126] mt-1 text-lg flex-shrink-0" icon="lucide:map-pin"></iconify-icon>
        <div>
          <p class="font-bold text-sm">收货地址</p>
          <p class="text-xs text-gray-500 mt-1" id="deliveryAddr">-</p>
        </div>
      </div>
    </div>
    <div class="space-y-4 fade-up d3">
      <button class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold hover:scale-[1.02] transition-transform text-sm">追踪我的订单</button>
      <a class="block w-full bg-white border border-orange-200 text-orange-800 py-4 rounded-2xl font-bold hover:bg-orange-50 transition-colors text-sm" href="index.html">返回首页再次选购</a>
    </div>
    <p id="countdown" class="text-xs text-gray-400 mt-8"></p>
    <p class="text-[10px] text-gray-300 mt-3">客服热线: (408) 555-0199</p>
  </div>
</div>
<script>
// Load order info from localStorage (set by checkout.html on success)
var orderNum = localStorage.getItem('mw_last_order_number') || '#MW' + Date.now().toString().slice(-8);
var delivDate = localStorage.getItem('mw_last_order_delivery');
var addr = localStorage.getItem('mw_address') || '收货地址';

document.getElementById('orderNum').textContent = orderNum;
document.getElementById('deliveryAddr').textContent = addr;

// Format delivery date
if (delivDate) {
  var d = new Date(delivDate + 'T12:00:00');
  var days = ['日','一','二','三','四','五','六'];
  document.getElementById('deliveryTime').textContent =
    '预计周' + days[d.getDay()] + ' (' + (d.getMonth()+1) + '月' + d.getDate() + '日) 14:00 - 18:00';
} else {
  // Calculate client-side fallback
  var now = new Date();
  var day = now.getDay();
  var daysToAdd = day===0||day===1 ? (2-day+7)%7||7 : day<=3 ? (5-day) : (9-day);
  if (!daysToAdd) daysToAdd = 7;
  var nd = new Date(now); nd.setDate(now.getDate()+daysToAdd);
  var days2 = ['日','一','二','三','四','五','六'];
  document.getElementById('deliveryTime').textContent =
    '预计周' + days2[nd.getDay()] + ' (' + (nd.getMonth()+1) + '月' + nd.getDate() + '日) 14:00 - 18:00';
}

// Cleanup
localStorage.removeItem('mw_last_order_id');
localStorage.removeItem('mw_last_order_number');
localStorage.removeItem('mw_last_order_delivery');
localStorage.removeItem('mw_recip_name');
localStorage.removeItem('mw_recip_phone');
localStorage.removeItem('mw_address');

// Countdown redirect
var secs = 8;
var countEl = document.getElementById('countdown');
function tick() {
  secs--;
  countEl.innerHTML = secs + '秒后自动返回首页 · <button onclick="cancelRedirect()" class="underline hover:text-slate-600">取消</button>';
  if (secs <= 0) { clearInterval(timer); window.location.href = 'index.html'; }
}
var timer = setInterval(tick, 1000);
tick();
function cancelRedirect() { clearInterval(timer); countEl.textContent = '已取消自动跳转'; }
</script>
</body>
</html>
